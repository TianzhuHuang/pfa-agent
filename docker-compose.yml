# PFA v2 — Next.js + FastAPI
# 本地验证: docker compose up --build
# 生产部署: 在 /opt/pfa 创建 .env（参考 .env.production.example），然后 docker compose build
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-${NEXT_PUBLIC_SITE_URL:-http://localhost:3000},http://127.0.0.1:3000}
    volumes:
      - ./data:/app/data  # 持久化 SQLite 数据库（未登录用户使用）

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}}
        REQUIRE_SUPABASE: ${REQUIRE_SUPABASE:-1}
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [backend]
